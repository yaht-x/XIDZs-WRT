name: Buildx³ Ophub Firmware

on:
  workflow_dispatch:
    inputs:
      release_branch:
        description: "Select the release branch:"
        required: true
        default: "openwrt:24.10.5"
        type: choice
        options:
          - openwrt:24.10.5
          - openwrt:23.05.6
          - immortalwrt:24.10.5
          - immortalwrt:23.05.7
      target:
        description: "Select device board"
        required: false
        default: "all-device"
        type: choice
        options:
          - all-device
          - opt-devices
          - rk-devices
          - Amlogic s905 MXQ-Pro+
          - Amlogic s905 Beelink-Mini
          - Amlogic s905lb Q96-Mini
          - Amlogic s905w TX3-Mini
          - Amlogic s905w X96-Mini
          - Amlogic s905w X96W
          - Amlogic s905x B860H
          - Amlogic s905x B860H MODSDCARD
          - Amlogic s905x HG680P
          - Amlogic s905x HG680P MODSDCARD
          - Amlogic s905x2 B860Hv5
          - Amlogic s905x2 B860Hv5-x
          - Amlogic s905x2 HG680-FJ
          - Amlogic s905x2 HG680-FJ-x
          - Amlogic s905x2 X96Max-v2Gb
          - Amlogic s905x2 X96Max-v4Gb
          - Amlogic s905x3 HK1-Vontar-X3
          - Amlogic s905x3 X96Air_100mb
          - Amlogic s905x3 X96Air_1Gb
          - Amlogic s905x3 X96Max+_100Mb
          - Amlogic s905x3 X96Max+_1Gb
          - Amlogic s905x3 H96-Max-X3
          - Amlogic s905x4 Advan-At01_Ax810
          - Amlogic s912 Nexbox-A1-A95X
          - Amlogic s912 Nexbox-A95X-A2
          - Amlogic s922x GT-King-Pro
          - Tanix-TX6
          - RK3318-BOX
          - Firefly-Rk3328
          - Rk3399 King3399
      tunnel:
        description: "Select Tunnel VPN"
        required: true
        default: "openclash"
        type: choice
        options:
          - openclash
          - openclash-passwall
          - openclash-nikki
          - openclash-fusiontunx
          - openclash-nikki-passwall
          - no-tunnel
      clean:
        description: "Do 'make clean' for each run"
        required: false
        default: "true"
        type: boolean

env:
  TZ: Asia/Jakarta
  WORKING_DIR: imagebuilder
  DEBIAN_FRONTEND: noninteractive
  RELEASE_BRANCH: ${{ github.event.inputs.release_branch }}
  TARGET: ${{ github.event.inputs.target }}
  TUNNEL: ${{ github.event.inputs.tunnel }}
  CLEAN: ${{ github.event.inputs.clean }}

jobs:
  prebuild:
    runs-on: ubuntu-24.04
    name: ${{ github.event.inputs.release_branch }}
    outputs:
      target: ${{ steps.set-matrix.outputs.target }}
      type: ${{ steps.setupenv.outputs.type }}
      base: ${{ steps.setupenv.outputs.base }}
      branch: ${{ steps.setupenv.outputs.branch }}
      verop: ${{ steps.setupenv.outputs.verop }}
      download_base: ${{ steps.setupenv.outputs.download_base }}
      date: ${{ steps.setupenv.outputs.date }}
      datetime: ${{ steps.setupenv.outputs.datetime }}
      datemonth: ${{ steps.setupenv.outputs.datemonth }}
      release_name: ${{ steps.setupenv.outputs.release_name }}
      release_tag: ${{ steps.setupenv.outputs.release_tag }}
    steps:       
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Set Matrix Run
        id: set-matrix
        run: |
          echo "Selected target option: [ ${{ github.event.inputs.target }} ]"
          
          TARGET_JSON=$(cat << 'EOJ'
          {
            "target": [
              "Amlogic s905 MXQ-Pro+",
              "Amlogic s905 Beelink-Mini",
              "Amlogic s905lb Q96-Mini",
              "Amlogic s905w TX3-Mini",
              "Amlogic s905w X96-Mini",
              "Amlogic s905w X96W",
              "Amlogic s905x B860H",
              "Amlogic s905x B860H MODSDCARD",
              "Amlogic s905x HG680P",
              "Amlogic s905x HG680P MODSDCARD",
              "Amlogic s905x2 B860Hv5",
              "Amlogic s905x2 HG680-FJ",
              "Amlogic s905x2 X96Max-v2Gb",
              "Amlogic s905x2 X96Max-v4Gb",
              "Amlogic s905x3 HK1-Vontar-X3",
              "Amlogic s905x3 X96Air_100mb",
              "Amlogic s905x3 X96Air_1Gb",
              "Amlogic s905x3 X96Max+_100Mb",
              "Amlogic s905x3 X96Max+_1Gb",
              "Amlogic s905x3 H96-Max-X3",
              "Amlogic s905x4 Advan-At01_Ax810",
              "Amlogic s912 Nexbox-A1-A95X",
              "Amlogic s912 Nexbox-A95X-A2",
              "Amlogic s922x GT-King-Pro",
              "Tanix-TX6",
              "Rk3318-BOX",
              "Rk3399 King3399"
            ]
          }
          EOJ
          )

          OPT_DEVICES_JSON=$(cat << 'EOJ'
          {
            "target": [
              "Amlogic s905x B860H",
              "Amlogic s905x B860H MODSDCARD",
              "Amlogic s905x HG680P",
              "Amlogic s905x HG680P MODSDCARD"
            ]
          }
          EOJ
          )
          
          RK_DEVICES_JSON=$(cat << 'EOJ'
          {
            "target": [
              "OrangePi 5 Plus",
              "OrangePi 5B",
              "H96-Max-M2",
              "NanoPi-M5",
              "Firefly-Rk3328"
            ]
          }
          EOJ
          )

          if [ "${{ github.event.inputs.target }}" == "all-device" ]; then
            echo "target=$(echo "$TARGET_JSON" | jq -c '.target')" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.inputs.target }}" == "opt-devices" ]; then
            echo "target=$(echo "$OPT_DEVICES_JSON" | jq -c '.target')" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.inputs.target }}" == "rk-devices" ]; then
            echo "target=$(echo "$RK_DEVICES_JSON" | jq -c '.target')" >> "$GITHUB_OUTPUT"
          else
            echo "target=$(jq -nc --arg d "${{ github.event.inputs.target }}" '[$d]')" >> "$GITHUB_OUTPUT"
          fi

          echo "Selected tunnel option: [ ${{ github.event.inputs.tunnel }} ]"

      - name: Setup Release Environment
        id: setupenv
        run: |
          sudo timedatectl set-timezone "${{ env.TZ }}"

          TYPE="OPHUB"
          echo "type=$TYPE" >> "$GITHUB_OUTPUT"

          BASE="${RELEASE_BRANCH%:*}"
          BRANCH="${RELEASE_BRANCH#*:}"
          VEROP="$(echo "${BRANCH}" | awk -F. '{print $1"."$2}')"

          echo "base=$BASE" >> "$GITHUB_OUTPUT"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "verop=$VEROP" >> "$GITHUB_OUTPUT"
          echo "download_base=https://downloads.${BASE}.org" >> "$GITHUB_OUTPUT"

          DATE=$(date +'%d%m%Y')
          DATETIME=$(date +'%d.%m.%Y-%H:%M:%S')
          DATEMONTH=$(date +"%B-%Y" | awk '{print tolower($0)}')

          echo "date=$DATE" >> "$GITHUB_OUTPUT"
          echo "datetime=$DATETIME" >> "$GITHUB_OUTPUT"
          echo "datemonth=$DATEMONTH" >> "$GITHUB_OUTPUT"

          if [ "${BASE}" == "openwrt" ]; then
            RELEASE_NAME="OpenWRT-Buildx³-${BRANCH}-${DATE}"
            RELEASE_TAG="openwrt-buildx³-${BRANCH}-${DATE}"
            echo "release_name=$RELEASE_NAME" >> "$GITHUB_OUTPUT"
            echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          elif [ "${BASE}" == "immortalwrt" ]; then
            RELEASE_NAME="ImmortalWRT-Buildx³-${BRANCH}-${DATE}"
            RELEASE_TAG="immortalwrt-buildx³-${BRANCH}-${DATE}"
            echo "release_name=$RELEASE_NAME" >> "$GITHUB_OUTPUT"
            echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          fi
          echo "status=success" >> "$GITHUB_OUTPUT"

      - name: Create Release
        if: steps.setupenv.outputs.status == 'success'
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.XIDZs_KEY }}
        with:
          tag_name: ${{ steps.setupenv.outputs.release_tag }}
          name: ${{ steps.setupenv.outputs.release_name }}
          prerelease: ${{ github.ref_name == 'dev' }}
          body: |

  build-firmware:
    name: Build ${{ matrix.target }} Firmware
    needs: prebuild
    runs-on: ubuntu-24.04
    env:
      TYPE: ${{ needs.prebuild.outputs.type }}
      BASE: ${{ needs.prebuild.outputs.base }}
      BRANCH: ${{ needs.prebuild.outputs.branch }}
      VEROP: ${{ needs.prebuild.outputs.verop }}
      DOWNLOAD_BASE: ${{ needs.prebuild.outputs.download_base }}
      DATE: ${{ needs.prebuild.outputs.date }}
      DATETIME: ${{ needs.prebuild.outputs.datetime }}
      DATEMONTH: ${{ needs.prebuild.outputs.datemonth }}
      RELEASE_NAME: ${{ needs.prebuild.outputs.release_name }}
      RELEASE_TAG: ${{ needs.prebuild.outputs.release_tag }}
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        target: ${{ fromJSON(needs.prebuild.outputs.target) }}

    steps:
      - name: Initialization environment
        id: init
        run: |
          docker rmi -f $(docker images -q) 2>/dev/null || true
          [[ -n "${AGENT_TOOLSDIRECTORY}" ]] && sudo rm -rf "${AGENT_TOOLSDIRECTORY}"
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android 2>/dev/null
          sudo swapoff -a
          sudo rm -f /swapfile /mnt/swapfile
          
          sudo -E apt-get -y update
          sudo -E apt-get -y purge azure-cli ghc* zulu* llvm* firefox google* dotnet* powershell openjdk* mongodb* moby* || true
          sudo -E apt-get -y install $(curl -fsSL https://ophub.org/ubuntu2404-make-openwrt-depends)
          sudo -E systemctl daemon-reload
          sudo -E apt-get -y autoremove --purge
          sudo -E apt-get clean
          sudo sed -i '/NVM_DIR/d;/skel/d' /root/{.bashrc,.profile}
          sudo rm -rf ~/{.cargo,.dotnet,.rustup}
          sudo timedatectl set-timezone "${{ env.TZ }}"
          
          echo "status=success" >> "$GITHUB_OUTPUT"

      - name: Create simulated physical disk
        id: disk
        if: steps.init.outputs.status == 'success' && (github.event.inputs.target == 'all-device' || github.event.inputs.target == 'opt-devices' || github.event.inputs.target == 'rk-devices')
        run: |
          mnt_size=$(expr $(df -h /mnt | tail -1 | awk '{print $4}' | sed 's/[[:alpha:]]//g' | sed 's/\..*//') - 1)
          root_size=$(expr $(df -h / | tail -1 | awk '{print $4}' | sed 's/[[:alpha:]]//g' | sed 's/\..*//') - 4)
          sudo truncate -s "${mnt_size}"G /mnt/mnt.img
          sudo truncate -s "${root_size}"G /root.img
          sudo losetup /dev/loop6 /mnt/mnt.img
          sudo losetup /dev/loop7 /root.img
          sudo pvcreate /dev/loop6
          sudo pvcreate /dev/loop7
          sudo vgcreate github /dev/loop6 /dev/loop7
          sudo lvcreate -n runner -l 100%FREE github
          sudo mkfs.xfs -f -i sparse=0 -b size=4096 /dev/github/runner
          sudo mkdir -p /builder
          sudo mount /dev/github/runner /builder
          sudo chown -R runner:runner /builder
          df -Th
          echo "status=success" >> "$GITHUB_OUTPUT"

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          path: origin
          fetch-depth: 1

      - name: Setup Build Variables
        id: variables
        run: |
          MATRIXTARGET="${{ matrix.target }}"
          echo "MATRIXTARGET=$MATRIXTARGET" >> $GITHUB_ENV

          NAMA_MODIFIED=$(echo $MATRIXTARGET | sed 's/ /-/g')
          echo "NAMA_MODIFIED=$NAMA_MODIFIED" >> $GITHUB_ENV

          case $BASE in
            openwrt)
              OP_BASE="OpenWrt"
              echo "OP_BASE=$OP_BASE" >> $GITHUB_ENV
              ;;
            immortalwrt)
              OP_BASE="ImmortalWrt"
              echo "OP_BASE=$OP_BASE" >> $GITHUB_ENV
              ;;
          esac

          echo "PROFILE=generic" >> $GITHUB_ENV
          echo "TARGET_SYSTEM=armsr/armv8" >> $GITHUB_ENV
          echo "TARGET_NAME=armsr-armv8" >> $GITHUB_ENV
          echo "ARCH_1=arm64" >> $GITHUB_ENV
          echo "ARCH_2=aarch64" >> $GITHUB_ENV
          echo "ARCH_3=aarch64_generic" >> $GITHUB_ENV

          case "$MATRIXTARGET" in
            "Amlogic s905 MXQ-Pro+")
              TARGET_BUILD="s905-mxqpro-plus"
              KERNEL="5.15.y_6.1.y"
              echo "TARGET_BUILD=$TARGET_BUILD" >> $GITHUB_ENV
              echo "KERNEL=$KERNEL" >> $GITHUB_ENV
              ;;
            "Amlogic s905 Beelink-Mini")
              TARGET_BUILD="s905-beelink-mini"
              KERNEL="5.15.y_6.1.y"
              echo "TARGET_BUILD=$TARGET_BUILD" >> $GITHUB_ENV
              echo "KERNEL=$KERNEL" >> $GITHUB_ENV
              ;;
            "Amlogic s905d Phicomm-N1")
              TARGET_BUILD="s905d"
              KERNEL="5.15.y_6.1.y"
              echo "TARGET_BUILD=$TARGET_BUILD" >> $GITHUB_ENV
              echo "KERNEL=$KERNEL" >> $GITHUB_ENV
              ;;
            "Amlogic s905l B860AV2")
              TARGET_BUILD="s905l"
              KERNEL="5.15.y_6.1.y"
              echo "TARGET_BUILD=$TARGET_BUILD" >> $GITHUB_ENV
              echo "KERNEL=$KERNEL" >> $GITHUB_ENV
              ;;
            "Amlogic s905l Mibox-4")
              TARGET_BUILD="s905l-mg101"
              KERNEL="5.15.y_6.1.y"
              echo "TARGET_BUILD=$TARGET_BUILD" >> $GITHUB_ENV
              echo "KERNEL=$KERNEL" >> $GITHUB_ENV
              ;;
            "Amlogic s905l2 M301A")
              TARGET_BUILD="s905l2"
              KERNEL="5.15.y_6.1.y"
              echo "TARGET_BUILD=$TARGET_BUILD" >> $GITHUB_ENV
              echo "KERNEL=$KERNEL" >> $GITHUB_ENV
              ;;
            "Amlogic s905l2 MGV-M301A")
              TARGET_BUILD="s905l2"
              KERNEL="5.15.y_6.1.y"
              echo "TARGET_BUILD=$TARGET_BUILD" >> $GITHUB_ENV
              echo "KERNEL=$KERNEL" >> $GITHUB_ENV
              ;;
            "Amlogic s905l3 HG680-LC")
              TARGET_BUILD="s905l3"
              KERNEL="5.15.y_6.1.y"
              echo "TARGET_BUILD=$TARGET_BUILD" >> $GITHUB_ENV
              echo "KERNEL=$KERNEL" >> $GITHUB_ENV
              ;;
            "Amlogic s905l3a B863AV3")
              TARGET_BUILD="s905l3a-m401a"
              KERNEL="5.15.y_6.1.y"
              echo "TARGET_BUILD=$TARGET_BUILD" >> $GITHUB_ENV
              echo "KERNEL=$KERNEL" >> $GITHUB_ENV
              ;;
            "Amlogic s905l3b MGV2000")
              TARGET_BUILD="s905l3b-e900v22e"
              KERNEL="5.15.y_6.1.y"
              echo "TARGET_BUILD=$TARGET_BUILD" >> $GITHUB_ENV
              echo "KERNEL=$KERNEL" >> $GITHUB_ENV
              ;;
            "Amlogic s905lb Q96-Mini")
              TARGET_BUILD="s905lb-q96-mini"
              KERNEL="5.15.y_6.1.y"
              echo "TARGET_BUILD=$TARGET_BUILD" >> $GITHUB_ENV
              echo "KERNEL=$KERNEL" >> $GITHUB_ENV
              ;;
            "Amlogic s905w TX3-Mini")
              TARGET_BUILD="s905w"
              KERNEL="5.15.y_6.1.y"
              echo "TARGET_BUILD=$TARGET_BUILD" >> $GITHUB_ENV
              echo "KERNEL=$KERNEL" >> $GITHUB_ENV
              ;;
            "Amlogic s905w X96-Mini")
              TARGET_BUILD="s905w-x96-mini"
              KERNEL="5.15.y_6.1.y"
              echo "TARGET_BUILD=$TARGET_BUILD" >> $GITHUB_ENV
              echo "KERNEL=$KERNEL" >> $GITHUB_ENV
              ;;
            "Amlogic s905w X96W")
              TARGET_BUILD="s905w-x96w"
              KERNEL="5.15.y_6.1.y"
              echo "TARGET_BUILD=$TARGET_BUILD" >> $GITHUB_ENV
              echo "KERNEL=$KERNEL" >> $GITHUB_ENV
              ;;
            "Amlogic s905x B860H")
              TARGET_BUILD="s905x-b860h"
              KERNEL="5.15.y_6.1.y_6.6.y"
              echo "TARGET_BUILD=$TARGET_BUILD" >> $GITHUB_ENV
              echo "KERNEL=$KERNEL" >> $GITHUB_ENV
              ;;
            "Amlogic s905x B860H MODSDCARD")
              TARGET_BUILD="s905x-b860h"
              KERNEL="5.15.y_6.1.y_6.6.y"
              echo "TARGET_BUILD=$TARGET_BUILD" >> $GITHUB_ENV
              echo "KERNEL=$KERNEL" >> $GITHUB_ENV
              ;;
            "Amlogic s905x HG680P")
              TARGET_BUILD="s905x"
              KERNEL="5.15.y_6.1.y_6.6.y"
              echo "TARGET_BUILD=$TARGET_BUILD" >> $GITHUB_ENV
              echo "KERNEL=$KERNEL" >> $GITHUB_ENV
              ;;
            "Amlogic s905x HG680P MODSDCARD")
              TARGET_BUILD="s905x"
              KERNEL="5.15.y_6.1.y_6.6.y"
              echo "TARGET_BUILD=$TARGET_BUILD" >> $GITHUB_ENV
              echo "KERNEL=$KERNEL" >> $GITHUB_ENV
              ;;
            "Amlogic s905x2 B860Hv5")
              TARGET_BUILD="s905x2-b860h-v5"
              KERNEL="6.1.y"
              echo "TARGET_BUILD=$TARGET_BUILD" >> $GITHUB_ENV
              echo "KERNEL=$KERNEL" >> $GITHUB_ENV
              ;;
            "Amlogic s905x2 B860Hv5-x")
              TARGET_BUILD="s905x2-b860h-v5"
              KERNEL="6.2.y_6.3.y_6.4.y"
              echo "TARGET_BUILD=$TARGET_BUILD" >> $GITHUB_ENV
              echo "KERNEL=$KERNEL" >> $GITHUB_ENV
              ;;
            "Amlogic s905x2 HG680-FJ")
              TARGET_BUILD="s905x2-hg680-fj"
              KERNEL="5.15.y_6.1.y"
              echo "TARGET_BUILD=$TARGET_BUILD" >> $GITHUB_ENV
              echo "KERNEL=$KERNEL" >> $GITHUB_ENV
              ;;
            "Amlogic s905x2 HG680-FJ-x")
              TARGET_BUILD="s905x2-hg680-fj"
              KERNEL="6.2.y_6.4.y"
              echo "TARGET_BUILD=$TARGET_BUILD" >> $GITHUB_ENV
              echo "KERNEL=$KERNEL" >> $GITHUB_ENV
              ;;
            "Amlogic s905x2 X96Max-v2Gb")
              TARGET_BUILD="s905x2-x96max-2g"
              KERNEL="5.15.y_6.1.y"
              echo "TARGET_BUILD=$TARGET_BUILD" >> $GITHUB_ENV
              echo "KERNEL=$KERNEL" >> $GITHUB_ENV
              ;;
            "Amlogic s905x2 X96Max-v4Gb")
              TARGET_BUILD="s905x2"
              KERNEL="5.15.y_6.1.y"
              echo "TARGET_BUILD=$TARGET_BUILD" >> $GITHUB_ENV
              echo "KERNEL=$KERNEL" >> $GITHUB_ENV
              ;;
            "Amlogic s905x3 HK1-Vontar-X3")
              TARGET_BUILD="s905x3-hk1"
              KERNEL="5.15.y_6.1.y"
              echo "TARGET_BUILD=$TARGET_BUILD" >> $GITHUB_ENV
              echo "KERNEL=$KERNEL" >> $GITHUB_ENV
              ;;
            "Amlogic s905x3 X96Air_100mb")
              TARGET_BUILD="s905x3-x96air"
              KERNEL="5.15.y_6.1.y"
              echo "TARGET_BUILD=$TARGET_BUILD" >> $GITHUB_ENV
              echo "KERNEL=$KERNEL" >> $GITHUB_ENV
              ;;
            "Amlogic s905x3 X96Air_1Gb")
              TARGET_BUILD="s905x3-x96air-gb"
              KERNEL="5.15.y_6.1.y"
              echo "TARGET_BUILD=$TARGET_BUILD" >> $GITHUB_ENV
              echo "KERNEL=$KERNEL" >> $GITHUB_ENV
              ;;
            "Amlogic s905x3 X96Max+_100Mb")
              TARGET_BUILD="s905x3"
              KERNEL="5.15.y_6.1.y"
              echo "TARGET_BUILD=$TARGET_BUILD" >> $GITHUB_ENV
              echo "KERNEL=$KERNEL" >> $GITHUB_ENV
              ;;
            "Amlogic s905x3 X96Max+_1Gb")
              TARGET_BUILD="s905x3-x96max"
              KERNEL="5.15.y_6.1.y"
              echo "TARGET_BUILD=$TARGET_BUILD" >> $GITHUB_ENV
              echo "KERNEL=$KERNEL" >> $GITHUB_ENV
              ;;
            "Amlogic s905x3 H96-Max-X3")
              TARGET_BUILD="s905x3-h96max"
              KERNEL="5.15.y_6.1.y"
              echo "TARGET_BUILD=$TARGET_BUILD" >> $GITHUB_ENV
              echo "KERNEL=$KERNEL" >> $GITHUB_ENV
              ;;
            "Amlogic s905x4 Advan-At01_Ax810")
              TARGET_BUILD="s905x4-advan"
              KERNEL="6.1.y_6.6.y"
              echo "TARGET_BUILD=$TARGET_BUILD" >> $GITHUB_ENV
              echo "KERNEL=$KERNEL" >> $GITHUB_ENV
              ;;
            "Amlogic s912 Nexbox-A1-A95X")
              TARGET_BUILD="s912-nexbox-a1"
              KERNEL="5.15.y_6.1.y"
              echo "TARGET_BUILD=$TARGET_BUILD" >> $GITHUB_ENV
              echo "KERNEL=$KERNEL" >> $GITHUB_ENV
              ;;
            "Amlogic s912 Nexbox-A95X-A2")
              TARGET_BUILD="s912-nexbox-a2"
              KERNEL="5.15.y_6.1.y"
              echo "TARGET_BUILD=$TARGET_BUILD" >> $GITHUB_ENV
              echo "KERNEL=$KERNEL" >> $GITHUB_ENV
              ;;
            "Amlogic s922x GT-King-Pro")
              TARGET_BUILD="s922x"
              KERNEL="5.15.y_6.1.y"
              echo "TARGET_BUILD=$TARGET_BUILD" >> $GITHUB_ENV
              echo "KERNEL=$KERNEL" >> $GITHUB_ENV
              ;;
            "Firefly-Rk3328")
              TARGET_BUILD="renegade-rk3328"
              KERNEL="5.15.y_6.1.y"
              echo "TARGET_BUILD=$TARGET_BUILD" >> $GITHUB_ENV
              echo "KERNEL=$KERNEL" >> $GITHUB_ENV
              ;;
            "Rk3318-BOX")
              TARGET_BUILD="rk3318-box"
              KERNEL="5.15.y_6.1.y"
              echo "TARGET_BUILD=$TARGET_BUILD" >> $GITHUB_ENV
              echo "KERNEL=$KERNEL" >> $GITHUB_ENV
              ;;            
            "Rk3528 H96-Max-M2")
              TARGET_BUILD="h96-max-m2"
              KERNEL="6.1.y"
              echo "TARGET_BUILD=$TARGET_BUILD" >> $GITHUB_ENV
              echo "KERNEL=$KERNEL" >> $GITHUB_ENV
              ;;
            "Rk3566 Panther-X2")
              TARGET_BUILD="panther-x2"
              KERNEL="6.1.y"
              echo "TARGET_BUILD=$TARGET_BUILD" >> $GITHUB_ENV
              echo "KERNEL=$KERNEL" >> $GITHUB_ENV
              ;;
            "Rk3568 NanoPi-R5S")
              TARGET_BUILD="nanopi-r5s"
              KERNEL="6.1.y"
              echo "TARGET_BUILD=$TARGET_BUILD" >> $GITHUB_ENV
              echo "KERNEL=$KERNEL" >> $GITHUB_ENV
              ;;
            "Rk3588 Rock5B")
              TARGET_BUILD="rock5b"
              KERNEL="6.1.y"
              echo "TARGET_BUILD=$TARGET_BUILD" >> $GITHUB_ENV
              echo "KERNEL=$KERNEL" >> $GITHUB_ENV
              ;;
            "Rk3399 King3399")
              TARGET_BUILD="king3399"
              KERNEL="6.1.y"
              echo "TARGET_BUILD=$TARGET_BUILD" >> $GITHUB_ENV
              echo "KERNEL=$KERNEL" >> $GITHUB_ENV
              ;;
            "Tanix-TX6")
              TARGET_BUILD="tanix-tx6"
              KERNEL="6.1.y"
              echo "TARGET_BUILD=$TARGET_BUILD" >> $GITHUB_ENV
              echo "KERNEL=$KERNEL" >> $GITHUB_ENV
              ;;
            "OrangePi3")
              TARGET_BUILD="orangepi-3"
              KERNEL="6.6.y"
              echo "TARGET_BUILD=$TARGET_BUILD" >> $GITHUB_ENV
              echo "KERNEL=$KERNEL" >> $GITHUB_ENV
              ;;
            "OrangePi Z Plus")
              TARGET_BUILD="orangepi-zplus"
              KERNEL="6.6.y"
              echo "TARGET_BUILD=$TARGET_BUILD" >> $GITHUB_ENV
              echo "KERNEL=$KERNEL" >> $GITHUB_ENV
              ;;
            "OrangePi Z Plus2")
              TARGET_BUILD="orangepi-zplus2"
              KERNEL="6.6.y"
              echo "TARGET_BUILD=$TARGET_BUILD" >> $GITHUB_ENV
              echo "KERNEL=$KERNEL" >> $GITHUB_ENV
              ;;
            "OrangePi Zero2")
              TARGET_BUILD="orangepi-zero2"
              KERNEL="6.6.y"
              echo "TARGET_BUILD=$TARGET_BUILD" >> $GITHUB_ENV
              echo "KERNEL=$KERNEL" >> $GITHUB_ENV
              ;;
            "OrangePi Zero3")
              TARGET_BUILD="orangepi-zero3"
              KERNEL="6.6.y"
              echo "TARGET_BUILD=$TARGET_BUILD" >> $GITHUB_ENV
              echo "KERNEL=$KERNEL" >> $GITHUB_ENV
              ;;          
            "OrangePi 5 Plus")
              TARGET_BUILD="orangepi-5-plus"
              KERNEL="6.1.y"
              echo "TARGET_BUILD=$TARGET_BUILD" >> $GITHUB_ENV
              echo "KERNEL=$KERNEL" >> $GITHUB_ENV
              ;;
            "OrangePi 5B")
              TARGET_BUILD="orangepi-5b"
              KERNEL="6.1.y"
              echo "TARGET_BUILD=$TARGET_BUILD" >> $GITHUB_ENV
              echo "KERNEL=$KERNEL" >> $GITHUB_ENV
              ;;
            "H96-Max-M2")
              TARGET_BUILD="h96-max-m2"
              KERNEL="6.1.y"
              echo "TARGET_BUILD=$TARGET_BUILD" >> $GITHUB_ENV
              echo "KERNEL=$KERNEL" >> $GITHUB_ENV
              ;;
            "NanoPi-M5")
              TARGET_BUILD="nanopi-m5"
              KERNEL="6.12.y"
              echo "TARGET_BUILD=$TARGET_BUILD" >> $GITHUB_ENV
              echo "KERNEL=$KERNEL" >> $GITHUB_ENV
              ;;
          esac

          echo "status=success" >> "$GITHUB_OUTPUT"

      - name: Download and Prepare Image Builder
        id: download
        if: steps.variables.outputs.status == 'success'
        run: |
          CURVER=$(echo "${BRANCH}" | cut -d'.' -f1)
          archive_ext=$([ "${CURVER}" -ge "24" ] && echo "tar.zst" || echo "tar.xz")

          FILENAME="${BASE}-imagebuilder-${BRANCH}-${TARGET_NAME}.Linux-x86_64.${archive_ext}"
          
          PRIMARY_URL="${DOWNLOAD_BASE}/releases/${BRANCH}/targets/${TARGET_SYSTEM}/${FILENAME}"
          
          FALLBACK_URL=""
          if [ "${BASE}" == "immortalwrt" ]; then
            FALLBACK_URL="https://immortalwrt.kyarucloud.moe/releases/${BRANCH}/targets/${TARGET_SYSTEM}/${FILENAME}"
          fi

          download_success=false
          
          echo "Attempting download from: $PRIMARY_URL"
          if wget --timeout=60 --tries=3 --progress=dot:giga "$PRIMARY_URL"; then
            echo "Download successful from primary URL"
            download_success=true
          else
            echo "Primary download failed, trying fallback"
          fi
          
          if [ "$download_success" = false ] && [ -n "$FALLBACK_URL" ]; then
            echo "Attempting download from fallback: $FALLBACK_URL"
            if wget --timeout=60 --tries=3 --progress=dot:giga "$FALLBACK_URL"; then
              echo "Download successful from fallback URL"
              download_success=true
            fi
          fi
          
          if [ "$download_success" = false ]; then
            echo "All download attempts failed!"
            exit 1
          fi

          case "${archive_ext}" in
            tar.xz)
              tar -xJf *-imagebuilder-* && rm -f *-imagebuilder-*.tar.xz
              ;;
            tar.zst)
              tar --use-compress-program=unzstd -xf *-imagebuilder-* && rm -f *-imagebuilder-*.tar.zst
              ;;
          esac

          mv *-imagebuilder-* ${WORKING_DIR}
          if [ -d "/builder" ]; then
            mv ${WORKING_DIR} /builder/
            ln -s /builder/${WORKING_DIR} ${WORKING_DIR}
            echo "Using simulated disk at /builder"
          fi
          cp -r $GITHUB_WORKSPACE/origin/* $GITHUB_WORKSPACE/${WORKING_DIR}

          echo "status=success" >> "$GITHUB_OUTPUT"

      - name: Set Permission Scripts
        id: set-permission
        if: steps.download.outputs.status == 'success'
        run: |
          cd ${{ env.WORKING_DIR }}

          chmod 755 shell/*.sh

          echo "status=success" >> "$GITHUB_OUTPUT"

      - name: Download External Packages
        id: packages
        if: steps.set-permission.outputs.status == 'success'
        run: |
          cd ${{ env.WORKING_DIR }}

          ./shell/PACKAGES.sh

          echo "status=success" >> "$GITHUB_OUTPUT"

      - name: Apply Patches and Customizations
        id: customize
        if: steps.packages.outputs.status == 'success'
        run: |
          cd ${{ env.WORKING_DIR }}

          ./shell/PATCH.sh

          ./shell/MISC.sh

          ./shell/TUNNEL.sh ${{ env.TUNNEL }}

          df -hT ${PWD}

          echo "status=success" >> "$GITHUB_OUTPUT"

      - name: Build Firmware Images
        id: build
        if: steps.customize.outputs.status == 'success'
        run: |
          cd ${{ env.WORKING_DIR }}

          mkdir -p compiled_images

          if [ "${{ env.CLEAN }}" == "true" ]; then
            make clean
          fi

          time ./shell/MAKE-IMAGE.sh ${{ env.PROFILE }} ${{ env.TUNNEL }}

          for file in bin/targets/"${{ env.TARGET_SYSTEM }}"/*-rootfs.tar.gz; do
            if [ -f "$file" ]; then
              new_name="XIDZs_$(basename "$file" -rootfs.tar.gz)_${{ env.TUNNEL }}-rootfs.tar.gz"
              mv "$file" compiled_images/$new_name
            fi
          done

          echo "Images built successfully:"
          ls -la compiled_images/

          echo "status=success" >> "$GITHUB_OUTPUT"

      - name: Repack OpenWrt
        id: repack
        if: steps.build.outputs.status == 'success'
        run: |
          cd ${{ env.WORKING_DIR }}

          ./shell/REPACKWRT.sh "ophub" "$TARGET_BUILD" "$KERNEL" "${{ env.TUNNEL }}"

          echo "status=success" >> "$GITHUB_OUTPUT"
          
      - name: Mod SDCard
        id: modsdcard
        if: steps.repack.outputs.status == 'success'
        run: |
          cd ${{ env.WORKING_DIR }}

          ./shell/MODSDCARD.sh

          echo "status=success" >> "$GITHUB_OUTPUT"
          
      - name: Before Upload
        id: beforeupload
        if: steps.modsdcard.outputs.status == 'success'
        run: |
          cd ${{ env.WORKING_DIR }}

          ./shell/RENAMEFW.sh

          echo "status=success" >> "$GITHUB_OUTPUT"

      - name: Create Release
        if: steps.beforeupload.outputs.status == 'success'
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.XIDZs_KEY }}
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_NAME }}
          files: ${{ env.WORKING_DIR }}/compiled_images/*.img.gz
          prerelease: ${{ github.ref_name == 'dev' }}

      - name: Cleanup Build Artifacts
        id: cleanup_artifacts
        if: always()
        run: |
          cd ${{ env.WORKING_DIR }} || cd $GITHUB_WORKSPACE/${{ env.WORKING_DIR }}
          
          sudo rm -rf bin/ build_dir/ dl/ feeds/ files/ package/ packages/ staging_dir/ tmp/
          sudo rm -rf .config .env logs/
          
          sudo rm -rf /tmp/*
          sudo apt-get clean
          sudo journalctl --vacuum-time=1h
          
          if [ -d "/builder" ]; then
            sudo rm -rf /builder/*
          fi
          
          df -h
          echo "status=success" >> "$GITHUB_OUTPUT"

      - name: Cleanup simulated disk
        if: always() && (github.event.inputs.target == 'all-device' || github.event.inputs.target == 'opt-devices' || github.event.inputs.target == 'rk-devices')
        run: |
          sudo umount /builder || true
          sudo lvremove -f /dev/github/runner || true
          sudo vgremove -f github || true
          sudo pvremove -f /dev/loop6 /dev/loop7 || true
          sudo losetup -d /dev/loop6 /dev/loop7 || true
          sudo rm -f /mnt/mnt.img /root.img || true
          sudo rmdir /builder || true
          df -h